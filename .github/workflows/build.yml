on:
  workflow_dispatch:
  push:
    branches:
    - main
name: Update pages
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
    - name: Setup environment
      run: npm install
    - name: Generate Framework
      run: mkdir _site && node _tools/generate-framework.js > _site/index.html
    - name: Copy assets
      run: cp -r _tools/assets _site
    - name: Deploy to "gh-pages" branch
      id: deployment
      uses: s0/git-publish-subdir-action@develop
      env:
        REPO: self
        BRANCH: gh-pages
        FOLDER: _site
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
